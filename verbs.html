<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verb Quest!</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Bubblegum+Sans&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Fredoka',sans-serif;background:linear-gradient(135deg,#FFE4B5 0%,#FFC8DD 50%,#BDE0FE 100%);min-height:100vh;padding:12px;color:#333;-webkit-tap-highlight-color:transparent}
.container{max-width:900px;margin:0 auto}

/* Top bar */
.topbar{background:white;border-radius:20px;padding:12px 18px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:12px;box-shadow:0 4px 0 rgba(0,0,0,0.08)}
.logo{font-family:'Bubblegum Sans',cursive;font-size:1.5em;color:#E65100;text-shadow:2px 2px 0 #FFD93D}
.stats{display:flex;gap:14px;align-items:center}
.stat-pill{background:#FFF3E0;padding:6px 14px;border-radius:50px;font-weight:700;font-size:0.95em;color:#E65100;display:flex;align-items:center;gap:6px}
.stat-coins{background:#FFF59D;color:#F57F17}

/* World screen */
.screen-title{text-align:center;font-family:'Bubblegum Sans',cursive;font-size:1.8em;color:#E65100;text-shadow:2px 2px 0 #FFD93D;margin-bottom:14px}
.worlds-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:18px}
.world-card{background:white;border-radius:18px;padding:14px;text-align:center;cursor:pointer;box-shadow:0 5px 0 rgba(0,0,0,0.08);transition:transform 0.15s;border:4px solid white;position:relative}
.world-card:hover{transform:translateY(-3px)}
.world-card.locked{opacity:0.5;cursor:not-allowed}
.world-icon{width:70px;height:70px;margin:0 auto 8px;background:#FFFCF5;border-radius:14px;border:2px dashed #FFD93D;display:flex;align-items:center;justify-content:center;padding:6px}
.world-icon svg{width:100%;height:100%}
.world-icon svg [stroke="#888"]{stroke:#5D4037}
.world-name{font-weight:700;font-size:1.05em;color:#333;margin-bottom:4px}
.world-progress{font-size:0.85em;color:#888;font-weight:600}
.world-stars{margin-top:4px;color:#FFD93D;font-size:1em;letter-spacing:2px}

/* World detail / game select */
.game-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:18px}
.game-card{background:white;border-radius:18px;padding:18px 12px;text-align:center;cursor:pointer;box-shadow:0 5px 0 rgba(0,0,0,0.08);transition:transform 0.15s;border:4px solid white}
.game-card:hover{transform:translateY(-3px)}
.game-emoji{font-size:2.5em;margin-bottom:6px;line-height:1}
.game-name{font-weight:700;color:#333;font-size:1em;margin-bottom:3px}
.game-desc{font-size:0.78em;color:#888;line-height:1.3}

/* Back button */
.back-btn{background:white;border:none;padding:8px 14px;border-radius:50px;font-family:'Fredoka',sans-serif;font-weight:700;cursor:pointer;font-size:0.95em;box-shadow:0 3px 0 rgba(0,0,0,0.08);margin-bottom:14px;color:#E65100}

/* Game area */
.game-area{background:white;border-radius:22px;padding:18px;box-shadow:0 6px 0 rgba(0,0,0,0.08)}
.game-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.game-title{font-family:'Bubblegum Sans',cursive;font-size:1.3em;color:#E65100}
.combo-display{font-weight:700;color:#FF6B6B;font-size:0.95em;min-width:80px;text-align:right}
.combo-display.fire{color:#FF6B6B;animation:pulse 0.6s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}

/* Quick Match */
.qm-display{width:200px;height:200px;background:#FFFCF5;border:3px dashed #FFE5B4;border-radius:18px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;padding:14px;transition:transform 0.2s}
.qm-display svg{width:100%;height:100%}
.qm-display svg [stroke="#888"]{stroke:#5D4037;stroke-width:2}
.qm-display.right{border-color:#4ECB71;background:#E8F5E9}
.qm-display.wrong{border-color:#FF6B6B;background:#FFEBEE;animation:shake 0.4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:460px;margin:0 auto}
.option-btn{padding:16px;background:white;border:4px solid #eee;border-radius:14px;font-family:'Fredoka',sans-serif;font-size:1.2em;font-weight:700;cursor:pointer;color:#333;transition:all 0.15s;text-transform:lowercase}
.option-btn:hover{border-color:#FFD93D;transform:translateY(-2px)}
.option-btn.correct{background:#4ECB71;color:white;border-color:#4ECB71}
.option-btn.wrong{background:#FF6B6B;color:white;border-color:#FF6B6B}

/* Word to Pic options */
.options-pics{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:400px;margin:0 auto}
.option-pic{background:#FFFCF5;border:4px solid #eee;border-radius:14px;cursor:pointer;aspect-ratio:1;display:flex;align-items:center;justify-content:center;padding:10px;transition:all 0.15s}
.option-pic:hover{border-color:#FFD93D;transform:translateY(-2px)}
.option-pic svg{width:90%;height:90%}
.option-pic svg [stroke="#888"]{stroke:#5D4037;stroke-width:2}
.option-pic.correct{border-color:#4ECB71;background:#E8F5E9}
.option-pic.wrong{border-color:#FF6B6B;background:#FFEBEE}

/* Sentence Slot */
.sentence-display{font-family:'Bubblegum Sans',cursive;font-size:1.5em;color:#333;text-align:center;background:#FFFCF5;border:3px dashed #FFE5B4;border-radius:16px;padding:24px 16px;margin-bottom:16px;line-height:1.5}
.slot-blank{display:inline-block;min-width:90px;padding:2px 14px;border-bottom:3px solid #E65100;color:#E65100;margin:0 4px}

/* Speak/play button */
.speak-btn{display:block;margin:0 auto 16px;background:#FFD93D;border:none;color:#333;padding:14px 28px;font-size:1.1em;font-family:'Fredoka',sans-serif;font-weight:700;border-radius:50px;cursor:pointer;box-shadow:0 4px 0 #C9A800}
.speak-btn:active{transform:translateY(2px);box-shadow:0 2px 0 #C9A800}

/* Memory */
.mem-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:480px;margin:0 auto}
.mem-cell{aspect-ratio:1;background:linear-gradient(135deg,#E65100,#FF9800);border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:white;font-size:1.6em;font-weight:700;transition:transform 0.2s;box-shadow:0 3px 0 rgba(0,0,0,0.15);padding:4px;overflow:hidden}
.mem-cell.flipped{background:#FFFCF5;border:3px solid #FFD93D;color:#E65100;font-size:0.9em}
.mem-cell.flipped svg{width:80%;height:80%}
.mem-cell.flipped svg [stroke="#888"]{stroke:#5D4037;stroke-width:2}
.mem-cell.flipped .mc-word{font-family:'Bubblegum Sans',cursive;font-size:1em}
.mem-cell.matched{background:#4ECB71;color:white;pointer-events:none}
.mem-cell.matched svg [stroke="#5D4037"]{stroke:white}

/* Speed Round */
.speed-timer{font-family:'Bubblegum Sans',cursive;font-size:3em;color:#FF6B6B;text-align:center;margin-bottom:10px;text-shadow:2px 2px 0 #FFD93D}
.speed-timer.warning{color:#FF6B6B;animation:pulse 0.5s infinite}
.speed-score{text-align:center;font-weight:700;color:#E65100;font-size:1.2em;margin-bottom:14px}
.best-score{text-align:center;font-size:0.9em;color:#888;margin-bottom:14px}

/* Feedback toast */
.toast{position:fixed;top:30%;left:50%;transform:translate(-50%,-50%) scale(0);font-family:'Bubblegum Sans',cursive;font-size:2.5em;font-weight:700;padding:14px 30px;border-radius:50px;color:white;pointer-events:none;z-index:999;animation:toastPop 1s ease-out forwards;text-shadow:2px 2px 0 rgba(0,0,0,0.2)}
@keyframes toastPop{0%{transform:translate(-50%,-50%) scale(0.3);opacity:0}30%{transform:translate(-50%,-50%) scale(1.2);opacity:1}80%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(-50%,-80%) scale(1);opacity:0}}
.toast.good{background:#4ECB71}
.toast.bad{background:#FF6B6B}
.toast.fire{background:linear-gradient(135deg,#FF6B6B,#FFD93D)}

/* Coin bump */
.coin-bump{position:fixed;top:50%;left:50%;font-size:2em;pointer-events:none;animation:coinUp 0.8s ease-out forwards;z-index:998}
@keyframes coinUp{0%{transform:translate(-50%,-50%) scale(0.5);opacity:0}20%{opacity:1}100%{transform:translate(-50%,-200%) scale(1.2);opacity:0}}

/* Round results */
.results{text-align:center;padding:20px}
.results-title{font-family:'Bubblegum Sans',cursive;font-size:2.2em;color:#E65100;margin-bottom:10px}
.results-big{font-size:4em;font-weight:700;color:#E65100;margin:10px 0}
.results-line{font-size:1.1em;color:#666;margin:6px 0}
.play-again-btn{background:#4ECB71;color:white;border:none;padding:14px 32px;font-size:1.2em;font-family:'Fredoka',sans-serif;font-weight:700;border-radius:50px;cursor:pointer;box-shadow:0 4px 0 #2E9E50;margin:8px}
.play-again-btn.alt{background:#FF9F40;box-shadow:0 4px 0 #C97400}

@media (max-width:600px){
  .options-grid{max-width:100%}
  .mem-grid{grid-template-columns:repeat(4,1fr);gap:5px}
  .mem-cell{font-size:1.1em}
  .sentence-display{font-size:1.2em;padding:18px 10px}
  .qm-display{width:160px;height:160px}
}
</style>
</head>
<body>
<div class="container">

<div class="topbar">
  <div class="logo">Verb Quest!</div>
  <div class="stats">
    <div class="stat-pill stat-coins">&#127775; <span id="coins">0</span></div>
    <div class="stat-pill" id="streakPill" style="display:none">&#128293; <span id="streakNum">0</span></div>
  </div>
</div>

<!-- WORLD SELECT -->
<div id="screen-worlds">
  <div class="screen-title">Pick a World!</div>
  <div class="worlds-grid" id="worldsGrid"></div>
  <div style="text-align:center;font-size:0.85em;color:#999;margin-top:10px">
    <a id="resetBtn" style="color:#999;cursor:pointer;text-decoration:underline">Reset all progress</a>
  </div>
</div>

<!-- GAME SELECT -->
<div id="screen-games" style="display:none">
  <button class="back-btn" id="backToWorlds">&#8592; Worlds</button>
  <div class="screen-title" id="worldTitle"></div>
  <div class="game-grid">
    <div class="game-card" data-game="quickmatch">
      <div class="game-emoji">&#9889;</div>
      <div class="game-name">Quick Match</div>
      <div class="game-desc">See pic, tap word</div>
    </div>
    <div class="game-card" data-game="sentence">
      <div class="game-emoji">&#127919;</div>
      <div class="game-name">Sentence Slot</div>
      <div class="game-desc">Fill the blank</div>
    </div>
    <div class="game-card" data-game="listen">
      <div class="game-emoji">&#128264;</div>
      <div class="game-name">Hear &amp; Tap</div>
      <div class="game-desc">Listen, pick pic</div>
    </div>
    <div class="game-card" data-game="memory">
      <div class="game-emoji">&#127922;</div>
      <div class="game-name">Memory</div>
      <div class="game-desc">Match the pairs</div>
    </div>
    <div class="game-card" data-game="speed">
      <div class="game-emoji">&#128640;</div>
      <div class="game-name">Speed Round</div>
      <div class="game-desc">30 seconds!</div>
    </div>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="screen-game" style="display:none">
  <button class="back-btn" id="backToGames">&#8592; Back</button>
  <div class="game-area">
    <div class="game-header">
      <div class="game-title" id="gameTitle"></div>
      <div class="combo-display" id="comboDisplay"></div>
    </div>
    <div id="gameBody"></div>
  </div>
</div>

</div>

const ALL_VERBS = WORLDS.reduce((a,w)=>a.concat(w.verbs),[]);

let state = loadState();
let currentWorld = null;
let currentGame = null;

// === STORAGE ===
function loadState(){
  try{const d=localStorage.getItem('verbQuestState');if(d)return JSON.parse(d)}catch(e){}
  return {coins:0, worlds:{}, mastery:{}, bestSpeed:0};
}
function saveState(){try{localStorage.setItem('verbQuestState',JSON.stringify(state))}catch(e){}}

// mastery: 0 = new, higher = better known. Tracks per verb.
function getMastery(verb){return state.mastery[verb]||0}
function bumpMastery(verb, delta){
  state.mastery[verb] = Math.max(0, (state.mastery[verb]||0) + delta);
  saveState();
}

// === SPEECH ===
function speak(text, rate){
  if(!('speechSynthesis' in window))return;
  if(!rate)rate=0.9;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate=rate; u.pitch=1.1; u.lang='en-US';
  const voices = window.speechSynthesis.getVoices();
  const pref = voices.find(v=>v.name.indexOf('Google')>=0 && v.lang.startsWith('en'))
            || voices.find(v=>v.lang.startsWith('en'));
  if(pref) u.voice = pref;
  window.speechSynthesis.speak(u);
}
if('speechSynthesis' in window) window.speechSynthesis.onvoiceschanged = function(){};

// === UI helpers ===
function updateCoins(){document.getElementById('coins').textContent = state.coins}
function showToast(text, kind){
  const el = document.createElement('div');
  el.className = 'toast ' + (kind||'good');
  el.textContent = text;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 1000);
}
function coinBump(amount){
  state.coins += amount;
  saveState();
  updateCoins();
  const el = document.createElement('div');
  el.className = 'coin-bump';
  el.innerHTML = '+'+amount+' &#127775;';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 800);
}

// === COMBO SYSTEM ===
let combo = 0;
function updateCombo(correct){
  if(correct){
    combo++;
    if(combo>=3){
      const pill = document.getElementById('streakPill');
      pill.style.display='flex';
      document.getElementById('streakNum').textContent = combo;
    }
    if(combo===3) showToast('On Fire!', 'fire');
    else if(combo===5) showToast('Unstoppable!', 'fire');
    else if(combo===10) showToast('Verb Master!', 'fire');
    else if(combo===15) showToast('Legendary!', 'fire');
    return Math.min(combo, 10); // bonus multiplier capped
  } else {
    combo = 0;
    document.getElementById('streakPill').style.display='none';
    return 0;
  }
}
function resetCombo(){combo=0;document.getElementById('streakPill').style.display='none'}

// === SMART VERB PICKER ===
// Weights words by inverse mastery so weak words show more
function pickVerb(pool){
  // pool is list of verbs (a world's verbs)
  const weights = pool.map(v => Math.max(1, 6 - getMastery(v))); // mastery 0 -> weight 6, mastery 5+ -> weight 1
  const total = weights.reduce((a,b)=>a+b, 0);
  let r = Math.random() * total;
  for(let i=0;i<pool.length;i++){
    r -= weights[i];
    if(r<=0) return pool[i];
  }
  return pool[pool.length-1];
}

function pickWrong(pool, except, n){
  const wrong = pool.filter(v=>v!==except);
  wrong.sort(()=>Math.random()-0.5);
  return wrong.slice(0, n);
}

// === WORLD SCREEN ===
function renderWorlds(){
  const grid = document.getElementById('worldsGrid');
  grid.innerHTML = '';
  WORLDS.forEach((world, idx) => {
    const wp = state.worlds[world.id] || {stars:0, mastered:0};
    const masteredCount = world.verbs.filter(v=>getMastery(v)>=3).length;
    wp.mastered = masteredCount;

    // Unlock: first world always; others need prior world to have 4+ mastered
    let locked = false;
    if(idx>0){
      const prev = state.worlds[WORLDS[idx-1].id];
      if(!prev || (prev.mastered||0) < 4) locked = true;
    }

    const card = document.createElement('div');
    card.className = 'world-card' + (locked?' locked':'');
    const stars = masteredCount >= 9 ? 3 : masteredCount >= 6 ? 2 : masteredCount >= 3 ? 1 : 0;
    const starsHtml = '&#11088;'.repeat(stars) + '&#9734;'.repeat(3-stars);
    card.innerHTML = `
      <div class="world-icon">${SVG[world.icon]||''}</div>
      <div class="world-name">${world.name}</div>
      <div class="world-progress">${masteredCount}/10 mastered</div>
      <div class="world-stars">${starsHtml}</div>
    `;
    if(!locked) card.addEventListener('click', ()=>openWorld(world));
    grid.appendChild(card);
  });
  updateCoins();
}

function openWorld(world){
  currentWorld = world;
  document.getElementById('screen-worlds').style.display='none';
  document.getElementById('screen-games').style.display='block';
  document.getElementById('screen-game').style.display='none';
  document.getElementById('worldTitle').textContent = world.name;
  window.scrollTo(0,0);
}

function backToWorlds(){
  document.getElementById('screen-worlds').style.display='block';
  document.getElementById('screen-games').style.display='none';
  document.getElementById('screen-game').style.display='none';
  renderWorlds();
  window.scrollTo(0,0);
}

function backToGames(){
  document.getElementById('screen-worlds').style.display='none';
  document.getElementById('screen-games').style.display='block';
  document.getElementById('screen-game').style.display='none';
  resetCombo();
  if(window.speechSynthesis) window.speechSynthesis.cancel();
  window.scrollTo(0,0);
}

document.getElementById('backToWorlds').addEventListener('click', backToWorlds);
document.getElementById('backToGames').addEventListener('click', backToGames);
document.getElementById('resetBtn').addEventListener('click', ()=>{
  if(confirm('Reset all progress?')){
    state = {coins:0, worlds:{}, mastery:{}, bestSpeed:0};
    saveState();
    renderWorlds();
  }
});

// === GAME LAUNCH ===
document.querySelectorAll('.game-card').forEach(c => {
  c.addEventListener('click', ()=>{
    const g = c.dataset.game;
    document.getElementById('screen-games').style.display='none';
    document.getElementById('screen-game').style.display='block';
    currentGame = g;
    resetCombo();
    window.scrollTo(0,0);
    if(g==='quickmatch') startQuickMatch();
    else if(g==='sentence') startSentenceSlot();
    else if(g==='listen') startListenTap();
    else if(g==='memory') startMemory();
    else if(g==='speed') startSpeedRound();
  });
});

// === QUICK MATCH ===
function startQuickMatch(){
  document.getElementById('gameTitle').textContent = 'Quick Match';
  document.getElementById('comboDisplay').textContent = '';
  quickMatchRound(0);
}
function quickMatchRound(roundsDone){
  if(roundsDone >= 10){
    showFinalResults('Quick Match', roundsDone);
    return;
  }
  const target = pickVerb(currentWorld.verbs);
  const wrong = pickWrong(currentWorld.verbs, target, 3);
  const options = [target, ...wrong].sort(()=>Math.random()-0.5);

  document.getElementById('gameBody').innerHTML = `
    <div class="qm-display" id="qmDisplay">${SVG[target]||''}</div>
    <div class="options-grid">
      ${options.map(v=>`<button class="option-btn" data-verb="${v}">${v}</button>`).join('')}
    </div>
    <div style="text-align:center;margin-top:14px;color:#999;font-size:0.85em">${roundsDone+1} / 10</div>
  `;

  // Speak the verb subtly when shown
  setTimeout(()=>speak(target, 0.85), 250);

  document.querySelectorAll('.option-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('.option-btn').forEach(b=>b.style.pointerEvents='none');
      const disp = document.getElementById('qmDisplay');
      if(btn.dataset.verb === target){
        btn.classList.add('correct');
        disp.classList.add('right');
        bumpMastery(target, 1);
        const mult = updateCombo(true);
        const reward = 5 + mult;
        coinBump(reward);
        if(combo<3) showToast('Yes!', 'good');
        setTimeout(()=>quickMatchRound(roundsDone+1), 900);
      } else {
        btn.classList.add('wrong');
        disp.classList.add('wrong');
        bumpMastery(target, -1);
        updateCombo(false);
        document.querySelectorAll('.option-btn').forEach(b=>{
          if(b.dataset.verb===target) b.classList.add('correct');
        });
        speak(target, 0.8);
        setTimeout(()=>quickMatchRound(roundsDone+1), 1600);
      }
    });
  });
}

// === SENTENCE SLOT ===
function startSentenceSlot(){
  document.getElementById('gameTitle').textContent = 'Sentence Slot';
  document.getElementById('comboDisplay').textContent = '';
  sentenceRound(0);
}
function sentenceRound(roundsDone){
  if(roundsDone >= 8){
    showFinalResults('Sentence Slot', roundsDone);
    return;
  }
  const target = pickVerb(currentWorld.verbs);
  const wrong = pickWrong(currentWorld.verbs, target, 3);
  const options = [target, ...wrong].sort(()=>Math.random()-0.5);
  const sentence = SENTENCES[target] || `I can ___.`;
  const display = sentence.replace('___', '<span class="slot-blank">?</span>');

  document.getElementById('gameBody').innerHTML = `
    <div class="sentence-display">${display}</div>
    <div class="options-grid">
      ${options.map(v=>`<button class="option-btn" data-verb="${v}">${v}</button>`).join('')}
    </div>
    <div style="text-align:center;margin-top:14px;color:#999;font-size:0.85em">${roundsDone+1} / 8</div>
  `;

  document.querySelectorAll('.option-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('.option-btn').forEach(b=>b.style.pointerEvents='none');
      const blank = document.querySelector('.slot-blank');
      blank.textContent = btn.dataset.verb;
      if(btn.dataset.verb === target){
        btn.classList.add('correct');
        bumpMastery(target, 1);
        const mult = updateCombo(true);
        coinBump(5 + mult);
        speak(sentence.replace('___', target), 0.85);
        if(combo<3) showToast('Nice!', 'good');
        setTimeout(()=>sentenceRound(roundsDone+1), 1700);
      } else {
        btn.classList.add('wrong');
        bumpMastery(target, -1);
        updateCombo(false);
        document.querySelectorAll('.option-btn').forEach(b=>{
          if(b.dataset.verb===target) b.classList.add('correct');
        });
        blank.textContent = target;
        speak(sentence.replace('___', target), 0.8);
        setTimeout(()=>sentenceRound(roundsDone+1), 1900);
      }
    });
  });
}

// === LISTEN & TAP ===
function startListenTap(){
  document.getElementById('gameTitle').textContent = 'Hear & Tap';
  document.getElementById('comboDisplay').textContent = '';
  listenRound(0);
}
function listenRound(roundsDone){
  if(roundsDone >= 8){
    showFinalResults('Hear & Tap', roundsDone);
    return;
  }
  const target = pickVerb(currentWorld.verbs);
  const wrong = pickWrong(currentWorld.verbs, target, 3);
  const options = [target, ...wrong].sort(()=>Math.random()-0.5);

  document.getElementById('gameBody').innerHTML = `
    <button class="speak-btn" id="speakAgain">&#128264; Play Sound</button>
    <div class="options-pics">
      ${options.map(v=>`<div class="option-pic" data-verb="${v}">${SVG[v]||''}</div>`).join('')}
    </div>
    <div style="text-align:center;margin-top:14px;color:#999;font-size:0.85em">${roundsDone+1} / 8</div>
  `;

  setTimeout(()=>speak(target, 0.75), 300);
  document.getElementById('speakAgain').addEventListener('click', ()=>speak(target, 0.75));

  document.querySelectorAll('.option-pic').forEach(opt=>{
    opt.addEventListener('click', ()=>{
      document.querySelectorAll('.option-pic').forEach(b=>b.style.pointerEvents='none');
      if(opt.dataset.verb === target){
        opt.classList.add('correct');
        bumpMastery(target, 1);
        const mult = updateCombo(true);
        coinBump(5 + mult);
        if(combo<3) showToast('Yes!', 'good');
        setTimeout(()=>listenRound(roundsDone+1), 900);
      } else {
        opt.classList.add('wrong');
        bumpMastery(target, -1);
        updateCombo(false);
        document.querySelectorAll('.option-pic').forEach(b=>{
          if(b.dataset.verb===target) b.classList.add('correct');
        });
        speak(target, 0.8);
        setTimeout(()=>listenRound(roundsDone+1), 1600);
      }
    });
  });
}

// === MEMORY ===
let memCards=[], memFlipped=[], memMatched=0, memLocked=false;
function startMemory(){
  document.getElementById('gameTitle').textContent = 'Memory';
  document.getElementById('comboDisplay').textContent = '';
  // Pick 6 verbs (12 cards total = 4x3 grid)
  const verbs = currentWorld.verbs.slice().sort(()=>Math.random()-0.5).slice(0,6);
  memCards = [];
  verbs.forEach((v,i)=>{
    memCards.push({type:'word', verb:v, pairId:i});
    memCards.push({type:'pic', verb:v, pairId:i});
  });
  memCards.sort(()=>Math.random()-0.5);
  memFlipped = [];
  memMatched = 0;
  memLocked = false;

  const grid = `<div class="mem-grid" id="memGrid"></div>
    <div style="text-align:center;margin-top:12px;color:#888;font-size:0.9em" id="memInfo">0 / 6 pairs</div>`;
  document.getElementById('gameBody').innerHTML = grid;
  const g = document.getElementById('memGrid');
  memCards.forEach((c,i)=>{
    const div = document.createElement('div');
    div.className = 'mem-cell';
    div.dataset.idx = i;
    div.textContent = '?';
    div.addEventListener('click', ()=>flipMem(div, c));
    g.appendChild(div);
  });
}
function flipMem(el, card){
  if(memLocked || el.classList.contains('flipped') || el.classList.contains('matched')) return;
  el.classList.add('flipped');
  el.textContent='';
  if(card.type==='word'){
    el.innerHTML = `<div class="mc-word">${card.verb}</div>`;
    speak(card.verb, 0.85);
  } else {
    el.innerHTML = SVG[card.verb]||'';
  }
  memFlipped.push({el, card});
  if(memFlipped.length===2){
    memLocked = true;
    const [a,b] = memFlipped;
    if(a.card.pairId===b.card.pairId && a.card.type!==b.card.type){
      setTimeout(()=>{
        a.el.classList.add('matched');
        b.el.classList.add('matched');
        memMatched++;
        bumpMastery(a.card.verb, 1);
        const mult = updateCombo(true);
        coinBump(8 + mult);
        document.getElementById('memInfo').textContent = memMatched + ' / 6 pairs';
        memFlipped = [];
        memLocked = false;
        if(memMatched===6){
          setTimeout(()=>showFinalResults('Memory', 6), 600);
        }
      }, 500);
    } else {
      updateCombo(false);
      setTimeout(()=>{
        a.el.classList.remove('flipped'); a.el.textContent='?';
        b.el.classList.remove('flipped'); b.el.textContent='?';
        memFlipped = [];
        memLocked = false;
      }, 1000);
    }
  }
}

// === SPEED ROUND ===
let speedTimer=null, speedSecondsLeft=0, speedScore=0;
function startSpeedRound(){
  document.getElementById('gameTitle').textContent = 'Speed Round';
  document.getElementById('comboDisplay').textContent = '';
  speedSecondsLeft = 30;
  speedScore = 0;
  renderSpeedUI();
  speedTimer = setInterval(()=>{
    speedSecondsLeft--;
    document.getElementById('speedTime').textContent = speedSecondsLeft;
    if(speedSecondsLeft <= 5){
      document.getElementById('speedTime').parentElement.classList.add('warning');
    }
    if(speedSecondsLeft <= 0){
      clearInterval(speedTimer);
      speedTimer = null;
      finishSpeed();
    }
  }, 1000);
  nextSpeedQuestion();
}
function renderSpeedUI(){
  document.getElementById('gameBody').innerHTML = `
    <div class="speed-timer"><span id="speedTime">${speedSecondsLeft}</span></div>
    <div class="speed-score">Score: <span id="speedScoreNum">0</span></div>
    <div class="best-score">Best: <span id="speedBest">${state.bestSpeed||0}</span></div>
    <div id="speedQ"></div>
  `;
}
function nextSpeedQuestion(){
  if(!speedTimer) return; // ran out
  const target = pickVerb(currentWorld.verbs);
  const wrong = pickWrong(currentWorld.verbs, target, 3);
  const options = [target, ...wrong].sort(()=>Math.random()-0.5);
  document.getElementById('speedQ').innerHTML = `
    <div class="qm-display" id="qmDisplay" style="width:140px;height:140px;margin-bottom:12px">${SVG[target]||''}</div>
    <div class="options-grid">
      ${options.map(v=>`<button class="option-btn" data-verb="${v}">${v}</button>`).join('')}
    </div>
  `;
  document.querySelectorAll('.option-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      if(btn.dataset.verb===target){
        speedScore++;
        bumpMastery(target, 1);
        updateCombo(true);
        coinBump(3);
        document.getElementById('speedScoreNum').textContent = speedScore;
        nextSpeedQuestion();
      } else {
        bumpMastery(target, -1);
        updateCombo(false);
        btn.classList.add('wrong');
        document.querySelectorAll('.option-btn').forEach(b=>{
          if(b.dataset.verb===target) b.classList.add('correct');
          b.style.pointerEvents='none';
        });
        speak(target, 0.85);
        setTimeout(()=>nextSpeedQuestion(), 900);
      }
    });
  });
}
function finishSpeed(){
  const wasBest = speedScore > (state.bestSpeed||0);
  if(wasBest){state.bestSpeed = speedScore; saveState();}
  document.getElementById('gameBody').innerHTML = `
    <div class="results">
      <div class="results-title">Time's Up!</div>
      <div class="results-big">${speedScore}</div>
      <div class="results-line">correct in 30 seconds</div>
      ${wasBest ? '<div class="results-line" style="color:#E65100;font-weight:700">&#127942; NEW BEST!</div>' : '<div class="results-line">Best: ' + (state.bestSpeed||0) + '</div>'}
      <button class="play-again-btn" onclick="startSpeedRound()">Play Again</button>
      <button class="play-again-btn alt" onclick="backToGames()">Done</button>
    </div>
  `;
  if(wasBest) showToast('NEW BEST!', 'fire');
}

// === FINAL RESULTS ===
function showFinalResults(gameName, rounds){
  const masteredInWorld = currentWorld.verbs.filter(v=>getMastery(v)>=3).length;
  // Save world progress
  state.worlds[currentWorld.id] = state.worlds[currentWorld.id] || {};
  state.worlds[currentWorld.id].mastered = masteredInWorld;
  saveState();
  document.getElementById('gameBody').innerHTML = `
    <div class="results">
      <div class="results-title">Great Round!</div>
      <div class="results-big">&#11088;</div>
      <div class="results-line">${gameName} done</div>
      <div class="results-line">${masteredInWorld} / 10 verbs mastered in this world</div>
      <button class="play-again-btn" id="resPlayAgain">Play Again</button>
      <button class="play-again-btn alt" id="resBackBtn">Try Another Game</button>
    </div>
  `;
  document.getElementById('resPlayAgain').addEventListener('click', ()=>{
    resetCombo();
    if(currentGame==='quickmatch') startQuickMatch();
    else if(currentGame==='sentence') startSentenceSlot();
    else if(currentGame==='listen') startListenTap();
    else if(currentGame==='memory') startMemory();
    else if(currentGame==='speed') startSpeedRound();
  });
  document.getElementById('resBackBtn').addEventListener('click', backToGames);
}

// === INIT ===
renderWorlds();
</script>
